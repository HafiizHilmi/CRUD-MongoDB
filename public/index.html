<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD Kampus App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background-color: #f8f9fa;
    }
  </style>
</head>

<body>

  <div class="container py-5">
    <h2 class="mb-4 fw-bold text-center"></i>Database</h2>

    <ul class="nav nav-pills mb-4 justify-content-center" id="myTab" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#mahasiswa-tab" type="button"
          onclick="loadMahasiswa()">Mahasiswa</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#dosen-tab" type="button"
          onclick="loadDosen()">Dosen</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#matkul-tab" type="button"
          onclick="loadMatkul()">Mata Kuliah</button>
      </li>
    </ul>

    <div class="tab-content">

      <div class="tab-pane fade show active" id="mahasiswa-tab">
        <div class="card shadow-sm border-0 rounded-4">
          <div class="card-header bg-white pt-4 pb-3 px-4 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold"></i>Data Mahasiswa</h5>
            <button class="btn btn-success btn-sm rounded-pill px-3 shadow-sm" onclick="showModal('mahasiswa')"><i
                class="fas fa-plus me-1"></i>Tambah</button>
          </div>
          <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>NRP</th>
                  <th>Nama</th>
                  <th>Matkul</th>
                  <th class="text-center">Aksi</th>
                </tr>
              </thead>
              <tbody id="tbody-mahasiswa"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="dosen-tab">
        <div class="card shadow-sm border-0 rounded-4">
          <div class="card-header bg-white pt-4 pb-3 px-4 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold"></i>Data Dosen</h5>
            <button class="btn btn-primary btn-sm rounded-pill px-3 shadow-sm" onclick="showModal('dosen')"><i
                class="fas fa-plus me-1"></i>Tambah</button>
          </div>
          <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>NIP</th>
                  <th>Nama</th>
                  <th class="text-center">Aksi</th>
                </tr>
              </thead>
              <tbody id="tbody-dosen"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="matkul-tab">
        <div class="card shadow-sm border-0 rounded-4">
          <div class="card-header bg-white pt-4 pb-3 px-4 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold"></i>Data Mata Kuliah</h5>
            <button class="btn btn-warning btn-sm rounded-pill px-3 shadow-sm" onclick="showModal('matkul')"><i
                class="fas fa-plus me-1"></i>Tambah</button>
          </div>
          <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Nama MK</th>
                  <th>Dosen Pengajar</th>
                  <th class="text-center">Aksi</th>
                </tr>
              </thead>
              <tbody id="tbody-matkul"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="modal fade" id="modalDosen" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="dosenModalTitle">Tambah Dosen</h5><button type="button" class="btn-close"
            data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="dosen_id">
          <div class="mb-3"><label>NIP</label><input type="text" id="dosen_nip" class="form-control" required></div>
          <div class="mb-3"><label>Nama</label><input type="text" id="dosen_nama" class="form-control" required></div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-primary"
            onclick="saveData('dosen')">Simpan</button></div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalMatkul" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="matkulModalTitle">Tambah Mata Kuliah</h5><button type="button" class="btn-close"
            data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="matkul_id">
          <div class="mb-3"><label>Nama Mata Kuliah</label><input type="text" id="matkul_nama" class="form-control"
              required></div>
          <div class="mb-3">
            <label>Dosen Pengajar</label>
            <select id="matkul_pengajar" class="form-select" required></select>
          </div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-warning"
            onclick="saveData('matkul')">Simpan</button></div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalMahasiswa" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Tambah Mahasiswa</h5><button type="button" class="btn-close"
            data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="mahasiswa_id">

          <div class="mb-3"><label>NRP</label><input type="text" id="mhs_nrp" class="form-control" required></div>
          <div class="mb-3"><label>Nama</label><input type="text" id="mhs_nama" class="form-control" required></div>
          <div class="mb-3">
            <label>Mata Kuliah</label>
            <select id="mhs_mk" class="form-select" multiple style="height: 100px;"></select>
          </div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-success"
            onclick="saveData('mahasiswa')">Simpan</button></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API = 'http://localhost:3000/api';
    let modalInstance = {};

    window.onload = () => {
      modalInstance.dosen = new bootstrap.Modal(document.getElementById('modalDosen'));
      modalInstance.matkul = new bootstrap.Modal(document.getElementById('modalMatkul'));
      modalInstance.mahasiswa = new bootstrap.Modal(document.getElementById('modalMahasiswa'));
      loadMahasiswa();
    };

    async function loadDosen() {
      try {
        const res = await fetch(`${API}/dosen`); const data = await res.json();
        document.getElementById('tbody-dosen').innerHTML = data.map(d => `
        <tr>
          <td>${d.nip}</td><td>${d.nama}</td>
          <td class="text-center">
            <button class="btn btn-sm btn-outline-primary me-1" onclick="editDosen('${d._id}', '${d.nip}', '${d.nama}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="hapusData('dosen', '${d._id}')"><i class="fas fa-trash"></i></button>
          </td>
        </tr>
      `).join('');
      } catch (e) { console.error(e); }
    }

    async function loadMatkul() {
      try {
        const res = await fetch(`${API}/matakuliah`); const data = await res.json();
        document.getElementById('tbody-matkul').innerHTML = data.map(m => `
        <tr>
          <td>${m.nama_mk}</td><td>${m.pengajar ? m.pengajar.nama : '-'}</td>
          <td class="text-center">
            <button class="btn btn-sm btn-outline-warning me-1" onclick="editMatkul('${m._id}', '${m.nama_mk}', '${m.pengajar?._id}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="hapusData('matakuliah', '${m._id}')"><i class="fas fa-trash"></i></button>
          </td>
        </tr>
      `).join('');
      } catch (e) { console.error(e); }
    }

    async function loadMahasiswa() {
      try {
        const res = await fetch(`${API}/mahasiswa`); const data = await res.json();
        document.getElementById('tbody-mahasiswa').innerHTML = data.map(m => `
        <tr>
          <td>${m.nrp}</td><td>${m.nama}</td>
          <td>${m.mk_yang_diambil.map(mk => `<span class="badge bg-info">${mk.nama_mk || 'MK'}</span>`).join(' ') || '-'}</td>
          <td class="text-center">
            <button class="btn btn-sm btn-outline-success me-1" onclick="editMahasiswa('${m._id}', '${m.nrp}', '${m.nama}', '${m.mk_yang_diambil.map(mk => mk._id).join(',')}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="hapusData('mahasiswa', '${m._id}')"><i class="fas fa-trash"></i></button>
          </td>
        </tr>
      `).join('');
      } catch (e) { console.error(e); }
    }

    async function showModal(type) {
      try {
        document.getElementById(`${type}_id`).value = '';

        if (type === 'matkul') {
          document.getElementById('matkul_nama').value = '';
          const res = await fetch(`${API}/dosen`);
          if (!res.ok) throw new Error(`Gagal fetch /api/dosen. Status: ${res.status}`);
          const dosen = await res.json();
          document.getElementById('matkul_pengajar').innerHTML = dosen.map(d => `<option value="${d._id}">${d.nama}</option>`).join('');
        }
        else if (type === 'mahasiswa') {
          document.getElementById('mhs_nrp').value = ''; document.getElementById('mhs_nama').value = '';
          const res = await fetch(`${API}/matakuliah`);
          if (!res.ok) throw new Error(`Gagal fetch /api/matakuliah. Status: ${res.status}`);
          const mk = await res.json();
          document.getElementById('mhs_mk').innerHTML = mk.map(m => `<option value="${m._id}">${m.nama_mk}</option>`).join('');
        }
        else {
          document.getElementById('dosen_nip').value = ''; document.getElementById('dosen_nama').value = '';
        }
        modalInstance[type].show();
      } catch (e) {
        console.error("ERR_LOAD");
      }
    }

    async function editMahasiswa(id, nrp, nama, mk_string) {
      await showModal('mahasiswa');

      document.getElementById('mahasiswa_id').value = id;

      document.getElementById('mhs_nrp').value = nrp;
      document.getElementById('mhs_nama').value = nama;

      const mkArray = mk_string.split(',');
      const options = document.getElementById('mhs_mk').options;
      for (let i = 0; i < options.length; i++) {
        options[i].selected = mkArray.includes(options[i].value);
      }
    }

    async function saveData(type) {
      try {
        let endpoint = '', payload = {};
        const id = document.getElementById(`${type}_id`).value;
        const method = id ? 'PUT' : 'POST';

        if (type === 'dosen') {
          endpoint = `${API}/dosen${id ? '/' + id : ''}`;
          payload = { nip: document.getElementById('dosen_nip').value, nama: document.getElementById('dosen_nama').value };
        } else if (type === 'matkul') {
          endpoint = `${API}/matakuliah${id ? '/' + id : ''}`;
          payload = { nama_mk: document.getElementById('matkul_nama').value, pengajar: document.getElementById('matkul_pengajar').value };
        } else if (type === 'mahasiswa') {
          endpoint = `${API}/mahasiswa${id ? '/' + id : ''}`;
          const selectedMk = Array.from(document.getElementById('mhs_mk').selectedOptions).map(opt => opt.value);
          payload = { nrp: document.getElementById('mhs_nrp').value, nama: document.getElementById('mhs_nama').value, mk_yang_diambil: selectedMk };
        }

        const res = await fetch(endpoint, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          console.error("ERR_SAVE");
          return;
        }

        modalInstance[type].hide();
        alert('✅ Data berhasil disimpan!');
        if (type === 'dosen') loadDosen(); else if (type === 'matkul') loadMatkul(); else loadMahasiswa();

      } catch (e) {
        console.error("ERR_SYS");
      }
    }

    async function hapusData(tipe_api, id) {
      if (confirm('Yakin ingin menghapus?')) {
        await fetch(`${API}/${tipe_api}/${id}`, { method: 'DELETE' });
        if (tipe_api === 'dosen') loadDosen(); else if (tipe_api === 'matakuliah') loadMatkul(); else loadMahasiswa();
      }
    }
  </script>

</body>

</html>
